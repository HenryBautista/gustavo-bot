name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Check syntax
        run: find . -name "*.js" -not -path "./node_modules/*" | xargs node --check

      - name: Run tests
        run: npm test
