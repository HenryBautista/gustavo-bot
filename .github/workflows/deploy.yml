name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" >> .env
          echo "APP_ID=${{ secrets.APP_ID }}" >> .env
          echo "PUBLIC_KEY=${{ secrets.PUBLIC_KEY }}" >> .env
          echo "PREFIX=${{ secrets.PREFIX }}" >> .env
          echo "NAVIDROME_URL=${{ secrets.NAVIDROME_URL }}" >> .env
          echo "NAVIDROME_USER=${{ secrets.NAVIDROME_USER }}" >> .env
          echo "NAVIDROME_PASS=${{ secrets.NAVIDROME_PASS }}" >> .env

      - name: Build and restart
        run: |
          docker compose build
          docker compose up -d --force-recreate
